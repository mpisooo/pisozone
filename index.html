<!doctype html>
<html lang="it" style="background:#0D0D0D">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0D0D0D" />
    <meta name="description" content="PisoZone — Il tuo tracker personale di attività fisica" />
    <link rel="canonical" href="https://pisozone-app.vercel.app/" />

    <!-- Anteprima social (Open Graph / Twitter Card) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PisoZone" />
    <meta property="og:url" content="https://pisozone-app.vercel.app/" />
    <meta property="og:title" content="PisoZone — Sai sempre se oggi è il giorno giusto per spingere" />
    <meta property="og:description" content="Oltre 50 sport, GPS, palestra strutturata e un coach di prontezza che usa solo i dati che inserisci già. Nessun sensore da comprare." />
    <meta property="og:image" content="https://pisozone-app.vercel.app/og-image.png" />
    <meta property="og:image:width" content="2400" />
    <meta property="og:image:height" content="1260" />
    <meta property="og:locale" content="it_IT" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PisoZone — Sai sempre se oggi è il giorno giusto per spingere" />
    <meta name="twitter:description" content="Oltre 50 sport, GPS, palestra strutturata e un coach di prontezza che usa solo i dati che inserisci già. Nessun sensore da comprare." />
    <meta name="twitter:image" content="https://pisozone-app.vercel.app/og-image.png" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PisoZone" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=3" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json?v=3" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg?v=3" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png?v=3" />

    <!-- Font self-hosted (P0-09, roadmap "PisoZone Next"): niente più
         fonts.googleapis.com, un profiling reale ha misurato 823ms di
         render-blocking dovuti a quel salto di dominio in più prima del
         primo paint — vedi @font-face in index.css. Preload sui due file
         effettivamente usati subito (titoli + corpo), non sull'intero set. -->
    <link rel="preload" href="/fonts/bebas-neue-latin-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-latin-var.woff2" as="font" type="font/woff2" crossorigin />

    <title>PisoZone</title>
  </head>
  <body style="background:#0D0D0D;margin:0">
    <div id="root"></div>
    <script>
      // Safari iOS ignora user-scalable=no nel browser: blocca il pinch-zoom via GestureEvent
      document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
      document.addEventListener('gesturechange', function (e) { e.preventDefault(); });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
